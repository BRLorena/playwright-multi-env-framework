<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - INT</title>
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/int.css">
  <style>
    .login-form {
      display: flex; flex-direction: column; gap: 14px;
      max-width: 380px; margin: 4rem auto; padding: 2rem;
      background: #16213e; border-radius: 14px;
      border: 1px solid #2a2a4a;
    }
    .login-form h2 { text-align: center; margin-bottom: 8px; color: #fff; }
    .login-form input {
      padding: 12px 16px; border: 2px solid #333; border-radius: 10px;
      font-size: 1rem; background: #0f3460; color: #eee;
    }
    .login-form input:focus { border-color: #e91e63; outline: none; }
    .login-form input::placeholder { color: #666; }
    .login-form button {
      padding: 12px 24px; background: linear-gradient(135deg, #e91e63, #9c27b0);
      color: white; border: none; border-radius: 10px; cursor: pointer;
      font-size: 1rem; font-weight: 600;
    }
    .login-form button:hover { opacity: 0.9; }
    .login-error { color: #ef5350; text-align: center; display: none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TODO List <span class="env-badge">INT</span></h1>
    <form class="login-form" data-testid="login-form" id="login-form">
      <h2>Sign In</h2>
      <input type="text" data-testid="login-username" id="login-username" placeholder="Username" autocomplete="off" required>
      <input type="password" data-testid="login-password" id="login-password" placeholder="Password" required>
      <button type="submit" data-testid="login-submit" id="login-submit">Login</button>
      <p class="login-error" data-testid="login-error" id="login-error">Invalid username or password</p>
    </form>
  </div>
  <script>
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (res.ok) {
        const { token } = await res.json();
        localStorage.setItem('auth-token', token);
        window.location.href = '/';
      } else {
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
